server {
    listen 80;
    listen 443 ssl;
    server_name lumenstudio.tech www.lumenstudio.tech;

    ssl_certificate /etc/ssl/certs/lumen.crt;
    ssl_certificate_key /etc/ssl/private/lumen.key;

    location = /api/home/featured {
        error_page 418 = @lumen_studio_home_read_fallback;
        error_page 500 502 503 504 = @lumen_studio_home_read_fallback;
        if ($request_method !~ ^(GET|HEAD)$) {
            return 418;
        }

        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_intercept_errors on;
        proxy_connect_timeout 1s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header sentry-trace $http_sentry_trace;
        proxy_set_header baggage $http_baggage;
        proxy_set_header CF-Ray $http_cf_ray;
        proxy_set_header X-Request-ID $request_id;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-store" always;
    }

    location = /api/home/templates {
        error_page 418 = @lumen_studio_home_read_fallback;
        error_page 500 502 503 504 = @lumen_studio_home_read_fallback;
        if ($request_method !~ ^(GET|HEAD)$) {
            return 418;
        }

        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_intercept_errors on;
        proxy_connect_timeout 1s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header sentry-trace $http_sentry_trace;
        proxy_set_header baggage $http_baggage;
        proxy_set_header CF-Ray $http_cf_ray;
        proxy_set_header X-Request-ID $request_id;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-store" always;
    }

    location @lumen_studio_home_read_fallback {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 1s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header sentry-trace $http_sentry_trace;
        proxy_set_header baggage $http_baggage;
        proxy_set_header CF-Ray $http_cf_ray;
        proxy_set_header X-Request-ID $request_id;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-store" always;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /v1/agent/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/flow {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }
}
