name = "lumen-frontend-edge-production"
main = "src/worker.mjs"
compatibility_date = "2026-07-01"
workers_dev = false
preview_urls = false

[vars]
ORIGIN_PASSTHROUGH_ENABLED = "true"

[[r2_buckets]]
binding = "FRONTEND_BUCKET"
bucket_name = "lumen-frontend-prod"

[[routes]]
pattern = "lumenstudio.tech/*"
zone_name = "lumenstudio.tech"

[[routes]]
pattern = "www.lumenstudio.tech/*"
zone_name = "lumenstudio.tech"

[observability]
enabled = true
