<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#090a0b" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="description" content="找不到请求的 Lumen 页面" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" sizes="any" />
    <title>页面不存在 — Lumen</title>
    <script type="module" src="/src/not-found-zh-main.ts"></script>
  </head>
  <body>
    <div id="root" data-lumen-static-not-found="zh">
      <main class="not-found-page">
        <div class="not-found-backdrop" aria-hidden="true">
          <span class="not-found-light"></span>
          <span class="not-found-grid"></span>
          <span class="not-found-vignette"></span>
        </div>
        <section class="not-found-content" aria-labelledby="not-found-title">
          <a class="not-found-brand" href="/zh" aria-label="Lumen 首页">
            <span class="not-found-mark" aria-hidden="true">
              <span class="not-found-mark-glow"></span>
              <span class="not-found-mark-shine"></span>
            </span>
            <span>Lumen</span>
          </a>
          <div class="not-found-copy">
            <p class="not-found-code" aria-hidden="true">404</p>
            <p class="not-found-eyebrow">错误 404</p>
            <h1 id="not-found-title">这个页面不在画面里。</h1>
            <p class="not-found-description">链接可能已经失效，或者页面已经搬到了新的位置。</p>
          </div>
          <div class="not-found-actions">
            <a class="not-found-primary" href="/zh">返回首页</a>
            <a class="not-found-secondary" href="/app/home">打开工作台</a>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
