<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#090a0b" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="description" content="The requested Lumen page could not be found" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" sizes="any" />
    <title>Page not found — Lumen</title>
    <script type="module" src="/src/not-found-en-main.ts"></script>
  </head>
  <body>
    <div id="root" data-lumen-static-not-found="en">
      <main class="not-found-page">
        <div class="not-found-backdrop" aria-hidden="true">
          <span class="not-found-light"></span>
          <span class="not-found-grid"></span>
          <span class="not-found-vignette"></span>
        </div>
        <section class="not-found-content" aria-labelledby="not-found-title">
          <a class="not-found-brand" href="/" aria-label="Lumen home">
            <span class="not-found-mark" aria-hidden="true">
              <span class="not-found-mark-glow"></span>
              <span class="not-found-mark-shine"></span>
            </span>
            <span>Lumen</span>
          </a>
          <div class="not-found-copy">
            <p class="not-found-code" aria-hidden="true">404</p>
            <p class="not-found-eyebrow">Error 404</p>
            <h1 id="not-found-title">This page is out of frame.</h1>
            <p class="not-found-description">
              The link may be outdated, or the page may have moved somewhere new.
            </p>
          </div>
          <div class="not-found-actions">
            <a class="not-found-primary" href="/">Back to home</a>
            <a class="not-found-secondary" href="/app/home">Open workspace</a>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
