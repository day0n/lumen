name: Publish Frontend Preview

on:
  workflow_dispatch:
    inputs:
      release:
        description: Full Git SHA to publish or reactivate
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: frontend-preview
  cancel-in-progress: false

jobs:
  publish-preview:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: frontend-preview
    steps:
      - name: Validate release format
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          RELEASE: ${{ inputs.release }}
          WORKFLOW_REF: ${{ github.ref }}
        run: |
          test "$WORKFLOW_REF" = "refs/heads/$DEFAULT_BRANCH"
          if [[ ! "$RELEASE" =~ ^[0-9a-f]{40}$ ]]; then
            echo "release must be a full lowercase Git SHA" >&2
            exit 1
          fi

      - name: Check out requested release
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release }}
          fetch-depth: 0

      - name: Validate release identity
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          RELEASE: ${{ inputs.release }}
        run: |
          test "$(git rev-parse HEAD)" = "$RELEASE"
          git fetch --no-tags origin "$DEFAULT_BRANCH"
          git merge-base --is-ancestor "$RELEASE" FETCH_HEAD

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and verify immutable release
        env:
          CI: 'true'
          RELEASE: ${{ inputs.release }}
        run: pnpm package:frontend --release "$RELEASE"

      - name: Upload and audit immutable release
        env:
          RELEASE: ${{ inputs.release }}
          FRONTEND_R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          FRONTEND_R2_BUCKET: lumen-frontend-preview
          FRONTEND_R2_ACCESS_KEY_ID: ${{ secrets.FRONTEND_R2_ACCESS_KEY_ID }}
          FRONTEND_R2_SECRET_ACCESS_KEY: ${{ secrets.FRONTEND_R2_SECRET_ACCESS_KEY }}
        run: pnpm run-script frontend:upload --release "$RELEASE"

      - name: Activate preview release
        env:
          RELEASE: ${{ inputs.release }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: >-
          pnpm dlx wrangler@4.107.0 deploy
          --config infra/cloudflare/edge/wrangler.toml
          --var "ACTIVE_FRONTEND_RELEASE:$RELEASE"

      - name: Verify preview response
        env:
          RELEASE: ${{ inputs.release }}
          FRONTEND_PREVIEW_URL: ${{ vars.FRONTEND_PREVIEW_URL }}
        run: |
          test -n "$FRONTEND_PREVIEW_URL"
          preview_base="${FRONTEND_PREVIEW_URL%/}"
          for path in "/app/dashboard" "/share/00000000000000000000000000000000" "/sign-in" "/zh/sign-up"; do
            headers="$(curl --fail --silent --show-error --head "${preview_base}${path}")"
            active_release="$(printf '%s\n' "$headers" | tr -d '\r' | awk -F': ' 'tolower($1) == "x-lumen-release" { print $2 }')"
            test "$active_release" = "$RELEASE"
          done

          response_directory="$(mktemp -d)"
          trap 'rm -rf "$response_directory"' EXIT
          while IFS='|' read -r path expected_lang expected_marker expected_title; do
            headers_file="$response_directory/${expected_marker}.headers"
            body_file="$response_directory/${expected_marker}.html"
            status="$(curl --silent --show-error --dump-header "$headers_file" --output "$body_file" --write-out '%{http_code}' "${preview_base}${path}")"
            test "$status" = "200"
            active_release="$(tr -d '\r' < "$headers_file" | awk -F': ' 'tolower($1) == "x-lumen-release" { print $2 }')"
            test "$active_release" = "$RELEASE"

            LANDING_BODY_FILE="$body_file" \
            EXPECTED_LANG="$expected_lang" \
            EXPECTED_MARKER="$expected_marker" \
            EXPECTED_TITLE="$expected_title" \
              node --input-type=module <<'NODE'
          import { readFileSync } from 'node:fs';

          const html = readFileSync(process.env.LANDING_BODY_FILE, 'utf8');
          const expectedLang = process.env.EXPECTED_LANG;
          const expectedMarker = process.env.EXPECTED_MARKER;
          const expectedTitle = process.env.EXPECTED_TITLE;
          const escapePattern = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          const hasAttribute = (tag, name, value) =>
            new RegExp(`\\b${escapePattern(name)}\\s*=\\s*(["'])${escapePattern(value)}\\1`, 'i').test(tag);
          const htmlTag = html.match(/<html\b[^>]*>/i)?.[0] ?? '';
          const title = html.match(/<title>([\s\S]*?)<\/title>/i)?.[1].trim();
          const rootMatch = html.match(/<div\b[^>]*\bid\s*=\s*(["'])root\1[^>]*>/i);
          const rootTag = rootMatch?.[0] ?? '';
          const afterRoot = rootMatch ? html.slice(rootMatch.index + rootTag.length).trimStart() : '';

          if (!hasAttribute(htmlTag, 'lang', expectedLang)) throw new Error(`missing landing lang ${expectedLang}`);
          if (title !== expectedTitle) throw new Error(`unexpected landing title: ${title ?? '<missing>'}`);
          if (!hasAttribute(rootTag, 'data-lumen-prerendered', 'true')) throw new Error('missing prerender marker');
          if (!hasAttribute(rootTag, 'data-lumen-static-landing', expectedMarker)) {
            throw new Error(`missing static landing marker ${expectedMarker}`);
          }
          if (!afterRoot || afterRoot.startsWith('</div>')) throw new Error('landing first screen is empty');
          NODE
          done <<'LANDINGS'
          /|en|en|Lumen — Turn products into videos that sell
          /zh|zh-CN|zh|Lumen — 把商品变成爆款带货视频
          LANDINGS

          while IFS='|' read -r path expected_lang expected_marker expected_title; do
            headers_file="$response_directory/auth-${expected_marker}.headers"
            body_file="$response_directory/auth-${expected_marker}.html"
            status="$(curl --silent --show-error --dump-header "$headers_file" --output "$body_file" --write-out '%{http_code}' "${preview_base}${path}")"
            test "$status" = "200"
            active_release="$(tr -d '\r' < "$headers_file" | awk -F': ' 'tolower($1) == "x-lumen-release" { print $2 }')"
            test "$active_release" = "$RELEASE"

            AUTH_BODY_FILE="$body_file" \
            EXPECTED_LANG="$expected_lang" \
            EXPECTED_MARKER="$expected_marker" \
            EXPECTED_TITLE="$expected_title" \
              node --input-type=module <<'NODE'
          import { readFileSync } from 'node:fs';

          const html = readFileSync(process.env.AUTH_BODY_FILE, 'utf8');
          const expectedLang = process.env.EXPECTED_LANG;
          const expectedMarker = process.env.EXPECTED_MARKER;
          const expectedTitle = process.env.EXPECTED_TITLE;
          const escapePattern = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          const hasAttribute = (tag, name, value) =>
            new RegExp(`\\b${escapePattern(name)}\\s*=\\s*(["'])${escapePattern(value)}\\1`, 'i').test(tag);
          const htmlTag = html.match(/<html\b[^>]*>/i)?.[0] ?? '';
          const title = html.match(/<title>([\s\S]*?)<\/title>/i)?.[1].trim();
          const rootMatch = html.match(/<div\b[^>]*\bid\s*=\s*(["'])root\1[^>]*>/i);
          const rootTag = rootMatch?.[0] ?? '';
          const afterRoot = rootMatch ? html.slice(rootMatch.index + rootTag.length).trimStart() : '';
          const robotsTag = [...html.matchAll(/<meta\b[^>]*>/gi)]
            .map((match) => match[0])
            .find((tag) => hasAttribute(tag, 'name', 'robots'));

          if (!hasAttribute(htmlTag, 'lang', expectedLang)) throw new Error(`missing auth lang ${expectedLang}`);
          if (title !== expectedTitle) throw new Error(`unexpected auth title: ${title ?? '<missing>'}`);
          if (!hasAttribute(rootTag, 'data-lumen-static-auth', expectedMarker)) {
            throw new Error(`missing static auth marker ${expectedMarker}`);
          }
          if (!robotsTag || !hasAttribute(robotsTag, 'content', 'noindex, nofollow')) {
            throw new Error('auth page must remain noindex');
          }
          if (!afterRoot || afterRoot.startsWith('</div>') || !afterRoot.includes('auth-loading')) {
            throw new Error('auth loading screen is empty');
          }
          NODE
          done <<'AUTH_PAGES'
          /sign-in|en|en|Account — Lumen
          /zh/sign-up|zh-CN|zh|账户 — Lumen
          AUTH_PAGES

          while IFS='|' read -r path expected_lang expected_marker expected_title; do
            headers_file="$response_directory/not-found-${expected_marker}.headers"
            body_file="$response_directory/not-found-${expected_marker}.html"
            status="$(curl --silent --show-error --dump-header "$headers_file" --output "$body_file" --write-out '%{http_code}' "${preview_base}${path}")"
            test "$status" = "404"
            active_release="$(tr -d '\r' < "$headers_file" | awk -F': ' 'tolower($1) == "x-lumen-release" { print $2 }')"
            test "$active_release" = "$RELEASE"

            NOT_FOUND_BODY_FILE="$body_file" \
            EXPECTED_LANG="$expected_lang" \
            EXPECTED_MARKER="$expected_marker" \
            EXPECTED_TITLE="$expected_title" \
              node --input-type=module <<'NODE'
          import { readFileSync } from 'node:fs';

          const html = readFileSync(process.env.NOT_FOUND_BODY_FILE, 'utf8');
          const expectedLang = process.env.EXPECTED_LANG;
          const expectedMarker = process.env.EXPECTED_MARKER;
          const expectedTitle = process.env.EXPECTED_TITLE;
          const escapePattern = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          const hasAttribute = (tag, name, value) =>
            new RegExp(`\\b${escapePattern(name)}\\s*=\\s*(["'])${escapePattern(value)}\\1`, 'i').test(tag);
          const htmlTag = html.match(/<html\b[^>]*>/i)?.[0] ?? '';
          const title = html.match(/<title>([\s\S]*?)<\/title>/i)?.[1].trim();
          const rootMatch = html.match(/<div\b[^>]*\bid\s*=\s*(["'])root\1[^>]*>/i);
          const rootTag = rootMatch?.[0] ?? '';
          const afterRoot = rootMatch ? html.slice(rootMatch.index + rootTag.length).trimStart() : '';
          const robotsTag = [...html.matchAll(/<meta\b[^>]*>/gi)]
            .map((match) => match[0])
            .find((tag) => hasAttribute(tag, 'name', 'robots'));

          if (!hasAttribute(htmlTag, 'lang', expectedLang)) throw new Error(`missing not-found lang ${expectedLang}`);
          if (title !== expectedTitle) throw new Error(`unexpected not-found title: ${title ?? '<missing>'}`);
          if (!hasAttribute(rootTag, 'data-lumen-static-not-found', expectedMarker)) {
            throw new Error(`missing static not-found marker ${expectedMarker}`);
          }
          if (!robotsTag || !hasAttribute(robotsTag, 'content', 'noindex, nofollow')) {
            throw new Error('not-found page must remain noindex');
          }
          if (!afterRoot || !afterRoot.includes('not-found-content') || !afterRoot.includes('404')) {
            throw new Error('not-found recovery screen is empty');
          }
          NODE
          done <<'NOT_FOUND_PAGES'
          /missing-static-page|en|en|Page not found — Lumen
          /zh/missing-static-page|zh-CN|zh|页面不存在 — Lumen
          NOT_FOUND_PAGES
