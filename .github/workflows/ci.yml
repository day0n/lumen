name: Continuous Integration

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: |
          pnpm --filter @lumen/shared build
          pnpm --filter @lumen/db build
          pnpm --filter @lumen/backend build

      - name: Typecheck workspaces
        run: |
          pnpm --filter @lumen/app typecheck
          pnpm --filter @lumen/studio typecheck
          pnpm --filter @lumen/db typecheck
          pnpm --filter @lumen/backend typecheck
          pnpm --filter @lumen/api typecheck
          pnpm --filter @lumen/agent typecheck
          pnpm --filter @lumen/engine typecheck

      - name: Run workspace tests
        run: |
          pnpm --filter @lumen/shared test
          pnpm --filter @lumen/app test
          pnpm --filter @lumen/studio test
          pnpm --filter @lumen/db test
          pnpm --filter @lumen/backend test
          pnpm --filter @lumen/api test
          pnpm --filter @lumen/agent test

      - name: Run edge router tests
        run: node --test infra/cloudflare/edge/test/*.test.mjs

      - name: Run engine tests
        env:
          MONGODB_URI: mongodb://127.0.0.1:27017/lumen_ci
          GOOGLE_OC_JSON: ci
          GOOGLE_CLOUD_PROJECT: ci
          FISH_AUDIO_API_KEY: ci
        run: >-
          pnpm --filter @lumen/engine exec tsx --test
          src/database/mongo.test.ts
          src/engine/model-errors.test.ts
          src/engine/resolver.test.ts
          src/handlers/video/edit.test.ts
          src/storage/project-snapshot.test.ts

      - name: Build applications
        env:
          CI: 'true'
          NEXT_DIST_DIR: .next-ci
        run: |
          pnpm --filter @lumen/app build
          pnpm --filter @lumen/studio build
          pnpm --filter @lumen/api build
          pnpm --filter @lumen/agent build
          pnpm --filter @lumen/engine build
