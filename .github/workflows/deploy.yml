name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 159.89.192.52
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: bash ~/lumen/deploy.sh
