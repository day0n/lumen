name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 159.89.192.52
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/lumen
            git checkout -- apps/lumen-studio/next-env.d.ts apps/lumen-studio/tsconfig.json 2>/dev/null || true
            git pull --ff-only origin main
            exec bash ./deploy.sh
